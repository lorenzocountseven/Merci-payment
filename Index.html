<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merci Payment</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Prompt', sans-serif; background: linear-gradient(135deg, #FFF9E2 0%, #F7D6E3 100%); min-height: 100vh; }
/* คงอนิเมชั่นเดิมไว้ทั้งหมด */
@keyframes float-up-down { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-15px) rotate(10deg); } }
@keyframes float-left-right { 0%, 100% { transform: translateX(0px) rotate(0deg); } 50% { transform: translateX(15px) rotate(-10deg); } }
@keyframes pulse-soft { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
@keyframes spin-slow { 100% { transform: rotate(360deg); } }
@keyframes dash-animation { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -24; } }
.animate-dash { animation: dash-animation 1s linear infinite; }
.anim-float-1 { animation: float-up-down 4s ease-in-out infinite; }
.anim-float-2 { animation: float-up-down 5s ease-in-out infinite 1.5s; }
.anim-float-3 { animation: float-left-right 6s ease-in-out infinite; }
.anim-float-4 { animation: float-left-right 4.5s ease-in-out infinite 2s; }
.anim-pulse { animation: pulse-soft 3s ease-in-out infinite; }
.anim-spin { animation: spin-slow 8s linear infinite; }
.glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 1); }
.virtual-card { transition: all 0.3s ease; }
.virtual-card:hover { transform: translateY(-4px); }
</style>
<script>
tailwind.config = { theme: { extend: { colors: { pink: { 400: '#C97EA9', 500: '#C97EA9' }, cream: { 100: '#FFF9E2' } } } } }
</script>
</head>
<body class="flex flex-col items-center py-6 px-4 text-[#8b5e3c] relative overflow-x-hidden">
<!-- คงส่วน Background SVGs ไว้ครบถ้วนเหมือนเดิม -->
<div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
    <!-- (คง SVG ทั้งหมดจากไฟล์เดิมไว้ที่นี่) -->
</div>

<div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-[#C97EA9]/95 backdrop-blur-sm text-white px-6 py-3 rounded-full shadow-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50 flex items-center gap-2 font-medium text-sm">
    คัดลอกเลขบัญชีแล้ว
</div>

<div class="max-w-[420px] w-full relative z-10 space-y-5 pb-10">
    <div class="text-center pt-2 pb-2 relative">
        <h1 class="text-2xl font-bold tracking-tight text-[#C97EA9]">Merci Payment</h1>
        <p class="text-sm font-medium text-[#C97EA9]/70 mt-1">Payment & Checkout</p>
    </div>

    <div class="glass-card rounded-[40px] p-3 relative z-10">
        <div class="rounded-[28px] overflow-hidden relative shadow-sm border-[4px] border-white">
            <img src="IMG_9129.jpeg" alt="Payment" class="w-full h-auto object-cover">
        </div>

        <div class="p-4 pt-6 space-y-5">
            <div class="text-center space-y-3">
                <p class="text-[15px] font-medium text-[#8b5e3c]">
                    เลขบัญชีตามนี้เลยค่า<br>
                    ชื่อบัญชี <span class="text-[#C97EA9] font-bold">Samatchaya K.</span>
                </p>
            </div>

            <!-- กสิกร -->
            <div class="virtual-card bg-[#C97EA9] rounded-[24px] p-5 shadow-lg cursor-pointer" onclick="copyText('1231764298', this, 'kbank')">
                <div class="flex justify-between items-center text-white">
                    <span class="font-bold">KBank</span>
                    <button class="kbank-btn bg-white/20 px-4 py-2 rounded-full text-xs font-bold">คัดลอก</button>
                </div>
                <div class="text-white font-bold text-[22px] tracking-widest mt-2">1231764298</div>
            </div>

            <!-- พร้อมเพย์ -->
            <div class="virtual-card bg-[#C97EA9]/80 rounded-[24px] p-5 shadow-lg cursor-pointer" onclick="copyText('0930171718', this, 'true')">
                <div class="flex justify-between items-center text-white">
                    <span class="font-bold">Prompt Pay</span>
                    <button class="true-btn bg-white/20 px-4 py-2 rounded-full text-xs font-bold">คัดลอก</button>
                </div>
                <div class="text-white font-bold text-[22px] tracking-widest mt-2">0930171718</div>
            </div>

            <!-- กล่องข้อความแจ้งเตือน -->
            <div class="bg-[#F7D6E3] border border-[#C97EA9] rounded-2xl p-3 text-[13px] text-[#8b5e3c] font-medium">
                โอนผิด โอนใหม่ ไม่โอนคืนนะคะ!<br>
                รบกวนเช็คชื่อและเลขบัญชีให้ดีก่อนโอนน้า
            </div>

            <div class="bg-[#FFF9E2] border border-[#C97EA9]/30 rounded-2xl p-3 text-[13px] text-[#8b5e3c] font-medium">
                โอนแล้วรบกวน แปะสลิปทุกครั้ง ด้วยน้าก้ะ<br>
                เค้าจะไดเช็คยอดให้ไวๆเล้ย
            </div>
        </div>
    </div>
</div>

<script>
    // คง Function copyText และ showToast ไว้เหมือนเดิมทุกประการ
    function copyText(text, containerElement, type) { /* โค้ดเดิม */ }
    function showToast() { /* โค้ดเดิม */ }
</script>
</body>
